<svg viewBox="0 0 940 812" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" role="img">
<title>Order Samurai sensei-cycle verified auto-remediation loop</title>
<desc>A 6-hourly oversight loop: it reads the metrics snapshot, spawns four read-only ronin scouts to re-measure live, runs a rival adversarial verifier in pre mode to confirm or refute findings, records a ledger, posts only confirmed and refuted verdicts to the ReflexEngine which fires or suppresses remediation, audits past code-modifying runs with rival in post mode, and escalates structural or stuck findings to a human-gated backlog.</desc>
<style>
  :root{--text-primary:#1a1a2e;--text-secondary:#4a4a5e;--text-muted:#82828f;--text-accent:#534ab7;
  --border:#e2e2ea;--border-strong:#c3c3cf;--border-stronger:#9a9aac;--surface-0:#ffffff;--surface-1:#f5f4fb;--surface-2:#eeedfe;}
</style>
<defs>
