<text x="20" y="678" font-size="10.5" font-style="italic" fill="var(--text-muted)">Scouts never write. Rival defaults to REFUTE. Only verified verdicts reach the engine; structural fixes need a human.</text>
<text x="20" y="697" font-size="10.5" font-style="italic" fill="var(--text-muted)">Distinct from the dojo loop: those ronins are write-capable (Sonnet, edit+commit); these are read-only verifiers.</text>
