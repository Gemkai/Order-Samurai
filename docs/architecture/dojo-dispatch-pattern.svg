<text x="450" y="350" text-anchor="middle" font-size="10" fill="var(--text-muted)">subagent_type=ronin · Sonnet · isolated git worktree  state/wt/&lt;slug&gt;</text>
<line x1="120" y1="330" x2="108" y2="418" stroke="var(--border-stronger)" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ah)"/>
