<rect x="300" y="420" width="300" height="56" rx="10" fill="var(--surface-1)" stroke="var(--border-strong)" stroke-width="1.5"/>
<text x="450" y="442" text-anchor="middle" font-size="12.5" font-weight="650" fill="var(--text-primary)">Worktree commit → result JSON</text>
<text x="450" y="458" text-anchor="middle" font-size="9.5" fill="var(--text-secondary)">state/ronin_results/&lt;slug&gt;.json  (main tree, absolute)</text>
