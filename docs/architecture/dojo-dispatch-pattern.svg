<rect x="696" y="420" width="190" height="56" rx="10" fill="var(--surface-1)" stroke="var(--border-strong)" stroke-width="1.5"/>
<text x="791" y="442" text-anchor="middle" font-size="12" font-weight="650" fill="var(--text-primary)">Domain specialist</text>
