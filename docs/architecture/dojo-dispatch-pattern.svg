<text x="450" y="81" text-anchor="middle" font-size="10.5" fill="var(--text-secondary)">orchestrator · Opus</text>
<text x="450" y="94" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">reads DOJO_STATE.json · ronin_logs.md</text>
<line x1="450" y1="100" x2="450" y2="150" stroke="var(--text-accent)" stroke-width="2" marker-end="url(#aha)"/>
<text x="460" y="128" font-size="10" fill="var(--text-secondary)">route 1 item / pillar</text>
