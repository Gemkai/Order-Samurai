<text x="450" y="187" text-anchor="middle" font-size="10" fill="var(--text-secondary)">bushido_check.py · AUTO / QUEUE / HARD_STOP</text>
<text x="588" y="160" font-size="9" fill="var(--text-muted)">↔ Reflex Engine</text>
