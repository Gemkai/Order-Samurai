<svg viewBox="0 0 900 748" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" role="img">
<title>Order Samurai dojo dispatch pattern</title>
<desc>Sensei orchestrator routes one backlog item per pillar through a Bushido gate, spawns four ronin subagents in parallel into isolated worktrees, each may offload to a local Ollama model or spawn one gated specialist, then writes a worktree commit and result JSON which Sensei validates and cherry-picks to main, repeating each cycle.</desc>
<style>
  :root{--text-primary:#1a1a2e;--text-secondary:#4a4a5e;--text-muted:#82828f;--text-accent:#534ab7;
  --border:#e2e2ea;--border-strong:#c3c3cf;--border-stronger:#9a9aac;--surface-0:#ffffff;--surface-1:#f5f4fb;--surface-2:#eeedfe;}
</style>
<defs>
<marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="var(--border-stronger)"/></marker>
<marker id="aha" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="var(--text-accent)"/></marker>
</defs>
