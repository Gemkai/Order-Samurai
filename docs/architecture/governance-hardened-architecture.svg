<svg viewBox="0 0 960 666" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" role="img">
<title>Agentica OS Governance — hardened architecture</title>
<desc>The current hardened governance architecture: a metrics pipeline produces a typed wid_payload envelope consumed by three separate control planes (Build/dojo, Run/ReflexEngine, Oversight/sensei-cycle) that stand on one shared kernel (typed envelope, fail-closed bushido gate, mechanism library) and all gate on a green doctor.py with six verifiers including the new drift-gate and live-source honesty checks. Landed across PRs 8, 9, 12, 13, 14.</desc>
